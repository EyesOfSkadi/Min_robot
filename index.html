<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Min — Trợ lý giọng nói</title>
<style>
  :root {
    --bg: #0f1020; --panel: #1a1c33; --accent: #7c5cff; --accent2: #4cc9f0;
    --text: #eef0ff; --muted: #9aa0c0; --user: #2a2d52; --min: #21304a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #20224a 0%, var(--bg) 55%);
    color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
    align-items: center;
  }
  header { text-align: center; padding: 28px 16px 8px; }
  header h1 { margin: 0; font-size: 28px; letter-spacing: .5px; }
  header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  .face {
    width: 96px; height: 84px; margin: 14px auto 0; border-radius: 22px;
    background: #05060d;                                   /* màn hình đen như Vector */
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 8px 34px rgba(41,224,255,.28), inset 0 0 22px rgba(0,0,0,.7);
    transition: transform .2s, width .3s, height .3s, gap .3s;
  }
  .face .eye {
    width: 20px; height: 30px; border-radius: 6px;
    background: var(--eyeColor, #29e0ff);                  /* mắt phát sáng cyan */
    box-shadow: 0 0 12px 1px var(--eyeColor, #29e0ff),
                inset 0 4px 5px rgba(255,255,255,.5), inset 0 -4px 6px rgba(0,0,0,.25);
    transform: translate(var(--ex, 0px), var(--ey, 0px));
    transition: height .12s, width .2s, transform .12s ease-out, background .4s, box-shadow .4s, border-radius .25s;
  }
  .face.speaking { animation: bob 1s ease-in-out infinite; }
  .face.listening .eye { height: 8px !important; }
  .face.blink .eye { height: 3px !important; }
  .face.wink .eye:last-child { height: 3px !important; }   /* nháy 1 mắt (tinh nghịch) */
  @keyframes bob { 50% { transform: translateY(-5px); } }

  /* Lớp bọc dành riêng cho CỬ ĐỘNG (gật/lắc/nảy) — tách khỏi nhún-nói & mắt-nhìn */
  .faceWrap { display: flex; justify-content: center; }
  .faceWrap.nod   { animation: nod .65s ease; }
  .faceWrap.shake { animation: shake .55s ease; }
  .faceWrap.pop   { animation: pop .5s ease; }
  @keyframes nod   { 0%,100% { transform: translateY(0); } 30% { transform: translateY(8px); } 65% { transform: translateY(0); } }
  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 55% { transform: translateX(8px); } 80% { transform: translateX(-4px); } }
  @keyframes pop   { 0% { transform: scale(1); } 40% { transform: scale(1.13); } 100% { transform: scale(1); } }

  /* Hình dạng mắt theo cảm xúc (rõ hơn màu sắc) */
  .face.mood-happy .eye, .face.mood-love .eye { height: 12px; border-radius: 14px 14px 4px 4px; }   /* cười: mắt cong ◠ */
  .face.mood-surprised .eye { width: 22px; height: 28px; border-radius: 50%; }                       /* ngạc nhiên: mắt tròn to */
  .face.mood-sad .eye { height: 13px; border-radius: 4px 4px 11px 11px; }                            /* buồn: mắt rủ xuống */
  body.focus .face.mood-happy .eye, body.focus .face.mood-love .eye { height: 34px; border-radius: 36px 36px 10px 10px; }
  body.focus .face.mood-surprised .eye { width: 58px; height: 76px; border-radius: 50%; }
  body.focus .face.mood-sad .eye { height: 36px; border-radius: 10px 10px 30px 30px; }

  /* Chế độ tập trung: ẩn khung chat, chỉ còn khuôn mặt Min to ở giữa */
  body.focus header { padding-top: 4vh; }
  body.focus header p, body.focus #chat, body.focus #textForm { display: none; }
  body.focus main { justify-content: flex-end; }
  body.focus .face { width: 260px; height: 220px; border-radius: 48px; gap: 26px; margin-top: 8vh; }
  body.focus .face .eye { width: 54px; height: 84px; border-radius: 16px; }
  body.focus .face.listening .eye { height: 22px !important; }
  body.focus .face.blink .eye, body.focus .face.wink .eye:last-child { height: 8px !important; }
  main {
    width: 100%; max-width: 720px; flex: 1; display: flex; flex-direction: column;
    padding: 16px; gap: 12px;
  }
  #chat {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    padding: 12px; background: var(--panel); border-radius: 16px; min-height: 280px;
  }
  .msg { padding: 10px 14px; border-radius: 14px; max-width: 82%; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 4px; }
  .msg.min  { align-self: flex-start; background: var(--min); border-bottom-left-radius: 4px; }
  .msg.sys  { align-self: center; background: transparent; color: var(--muted); font-size: 13px; }
  .tools { font-size: 12px; color: var(--accent2); margin-top: 4px; }
  .controls { display: flex; gap: 10px; align-items: center; }
  #talk {
    flex: 1; border: none; border-radius: 14px; padding: 16px; font-size: 16px;
    color: #fff; cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent2));
    transition: transform .1s, opacity .2s;
  }
  #talk:active { transform: scale(.98); }
  #talk.rec { background: linear-gradient(135deg, #ff4d6d, #ff9e6d); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 0 10px rgba(255,77,109,.18); } }
  .iconbtn {
    border: 1px solid #33365e; background: var(--panel); color: var(--text);
    border-radius: 12px; padding: 14px; cursor: pointer; font-size: 16px;
  }
  form.textrow { display: flex; gap: 8px; }
  form.textrow input {
    flex: 1; border-radius: 12px; border: 1px solid #33365e; background: #14162c;
    color: var(--text); padding: 12px 14px; font-size: 15px;
  }
  form.textrow button {
    border: none; border-radius: 12px; background: var(--accent); color: #fff;
    padding: 0 18px; cursor: pointer; font-size: 15px;
  }
  .bar { display: flex; gap: 14px; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px; padding-bottom: 18px; flex-wrap: wrap; }
  .bar label { display: flex; gap: 6px; align-items: center; cursor: pointer; }
  .bar a { color: var(--accent2); cursor: pointer; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #555; display: inline-block; }
  .dot.on { background: #36d399; }
</style>
</head>
<body>
  <header>
    <div class="faceWrap" id="faceWrap"><div class="face" id="face"><div class="eye"></div><div class="eye"></div></div></div>
    <h1>Min</h1>
    <p>Người bạn AI nói tiếng Việt của cậu</p>
  </header>

  <main>
    <div id="chat">
      <div class="msg sys">Bấm nút micro và nói với Min, hoặc gõ chữ ở dưới.</div>
    </div>

    <div class="controls">
      <button id="talk">🎤 Nhấn để nói</button>
      <button class="iconbtn" id="stopSpeak" title="Min im lặng">🔇</button>
    </div>

    <form class="textrow" id="textForm">
      <input id="textInput" placeholder="…hoặc gõ tin nhắn cho Min" autocomplete="off" />
      <button type="submit">Gửi</button>
    </form>
  </main>

  <!-- Camera: chỉ bật đúng lúc chụp rồi tắt ngay -->
  <video id="cam" playsinline muted style="display:none"></video>
  <canvas id="canvas" style="display:none"></canvas>
  <div id="camPreview" style="display:none;position:fixed;bottom:16px;right:16px;width:160px;border-radius:12px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.5);z-index:50;">
    <video id="camView" playsinline muted style="width:100%;display:block"></video>
    <div style="position:absolute;bottom:6px;left:0;right:0;text-align:center;color:#fff;font-size:12px;text-shadow:0 1px 3px #000;">📷 Min đang nhìn…</div>
  </div>

  <div class="bar">
    <label><input type="checkbox" id="focusMode" /> Ẩn khung chat</label>
    <label><input type="checkbox" id="contMode" /> Trò chuyện liên tục</label>
    <span><span class="dot" id="brainDot"></span> bộ não</span>
    <a id="clearBtn">Xoá trí nhớ &amp; lịch sử</a>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const chat = $("chat"), face = $("face"), talk = $("talk");

// --- Bộ nhớ phía client (gửi kèm mỗi request) ---
const LS_HIST = "min_history", LS_MEM = "min_memories";
let history = JSON.parse(localStorage.getItem(LS_HIST) || "[]");
let memories = JSON.parse(localStorage.getItem(LS_MEM) || "[]");
function save() {
  localStorage.setItem(LS_HIST, JSON.stringify(history.slice(-48)));
  localStorage.setItem(LS_MEM, JSON.stringify(memories));
}

// Khôi phục hội thoại cũ lên màn hình
for (const m of history) addBubble(m.role === "user" ? "user" : "min", m.content, false);

function addBubble(who, text, persistScroll = true) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  chat.appendChild(div);
  if (persistScroll) chat.scrollTop = chat.scrollHeight;
  return div;
}

// --- Mắt Min nhìn theo ngón tay / con trỏ ---
const eyes = face.querySelectorAll(".eye");
let eyeReset = null;
function lookAt(px, py) {
  const r = face.getBoundingClientRect();
  const dx = px - (r.left + r.width / 2);
  const dy = py - (r.top + r.height / 2);
  const ex = Math.max(-1, Math.min(1, dx / 140)) * 9;   // lệch ngang tối đa 9px
  const ey = Math.max(-1, Math.min(1, dy / 140)) * 7;   // lệch dọc tối đa 7px
  eyes.forEach(e => { e.style.setProperty("--ex", ex.toFixed(1) + "px"); e.style.setProperty("--ey", ey.toFixed(1) + "px"); });
}
function recenterEyes() {
  eyes.forEach(e => { e.style.setProperty("--ex", "0px"); e.style.setProperty("--ey", "0px"); });
}
// pointermove bao cả chuột (desktop) lẫn ngón tay đang chạm (mobile)
let lastPointer = 0;
document.addEventListener("pointermove", (e) => {
  lastPointer = Date.now();
  lookAt(e.clientX, e.clientY);
  if (e.pointerType === "touch") { clearTimeout(eyeReset); eyeReset = setTimeout(recenterEyes, 1500); }
});
document.addEventListener("pointerup", (e) => { if (e.pointerType === "touch") setTimeout(recenterEyes, 600); });
document.addEventListener("pointercancel", recenterEyes);
document.addEventListener("mouseleave", recenterEyes);

// --- Mắt tự đảo nhìn xung quanh khi rảnh (sống động, nhất là lúc ẩn chat) ---
setInterval(() => {
  if (typeof listening !== "undefined" && listening) return;   // đang nghe -> mắt nheo, để yên
  if (Date.now() - lastPointer < 2500) return;                 // vừa rê chuột/chạm -> để pointer điều khiển
  const ex = (Math.random() * 2 - 1) * 7, ey = (Math.random() * 2 - 1) * 5;
  eyes.forEach(e => { e.style.setProperty("--ex", ex.toFixed(1) + "px"); e.style.setProperty("--ey", ey.toFixed(1) + "px"); });
}, 1900);

// --- Chớp mắt + nháy một mắt (tinh nghịch) ---
function blink() { face.classList.add("blink"); setTimeout(() => face.classList.remove("blink"), 150); }
function wink() { face.classList.add("wink"); setTimeout(() => face.classList.remove("wink"), 220); }
(function loopBlink() {
  setTimeout(() => {
    if (!(typeof listening !== "undefined" && listening)) (Math.random() < 0.25 ? wink() : blink());
    loopBlink();
  }, 3500 + Math.random() * 4000);
})();

// --- Biểu cảm theo nội dung: đổi MÀU MẮT (như Vector thật) ---
const EYE_COLORS = {
  neutral:   "#29e0ff",   // cyan đặc trưng Vector
  happy:     "#3df0c4",   // xanh ngọc
  love:      "#ff77c8",   // hồng
  surprised: "#5ad1ff",
  sad:       "#6f86d6",   // xanh trầm
  thinking:  "#7c87b2",   // xám mờ
};
const faceWrap = $("faceWrap");
function gesture(name) {                          // chạy cử động một lần (gật/lắc/nảy)
  faceWrap.classList.remove("nod", "shake", "pop");
  void faceWrap.offsetWidth;                      // ép reflow để animation lặp lại được
  faceWrap.classList.add(name);
}
faceWrap.addEventListener("animationend", () => faceWrap.classList.remove("nod", "shake", "pop"));

const MOOD_KEYS = ["mood-happy", "mood-love", "mood-surprised", "mood-sad", "mood-thinking", "mood-neutral"];
function setMood(m) {
  if (!EYE_COLORS[m]) m = "neutral";
  face.style.setProperty("--eyeColor", EYE_COLORS[m]);    // đổi màu mắt theo cảm xúc
  face.classList.remove(...MOOD_KEYS);
  face.classList.add("mood-" + m);
  if (m === "happy" || m === "love") { gesture("nod"); setTimeout(wink, 380); }  // vui/yêu -> gật + nháy mắt
  else if (m === "surprised") gesture("pop");             // ngạc nhiên -> nảy lên
  else if (m === "sad") gesture("shake");                 // buồn -> lắc đầu nhẹ
}
function moodFromText(t) {
  t = (t || "").toLowerCase();
  if (/(yêu|thương|đáng yêu|dễ thương|thích cậu|nhớ cậu|tim|trái tim)/.test(t)) return "love";
  if (/(buồn|tiếc|xin lỗi|huhu|tệ quá|đáng tiếc|thất vọng|hic)/.test(t)) return "sad";
  if (/(ồ|ôi|wow|trời ơi|thật sao|thật á|ngạc nhiên|bất ngờ|gì cơ|hả|ơ)/.test(t)) return "surprised";
  if (/(haha|hihi|vui|tuyệt|hay quá|thích|tốt quá|yay|tuyệt vời|hào hứng|thú vị|hoan hô|😄|😁)/.test(t)) return "happy";
  return "neutral";
}

// --- Bật/tắt khung chat (chế độ tập trung) ---
const LS_FOCUS = "min_focus";
function applyFocus(on) { document.body.classList.toggle("focus", on); $("focusMode").checked = on; localStorage.setItem(LS_FOCUS, on ? "1" : "0"); }
$("focusMode").onchange = () => applyFocus($("focusMode").checked);
applyFocus(localStorage.getItem(LS_FOCUS) === "1");

// --- Đọc to (TTS): server sinh giọng tiếng Việt (edge-tts), KHÔNG phụ thuộc trình duyệt ---
// Mobile chặn tự phát audio: dùng MỘT phần tử audio cố định, "mở khoá" bằng cú chạm đầu tiên.
const player = new Audio();
player.setAttribute("playsinline", "");
let audioUnlocked = false, currentUrl = null;
const SILENT = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=";
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  try { player.src = SILENT; const p = player.play(); if (p && p.catch) p.catch(() => {}); } catch (_) {}
  try { const u = new SpeechSynthesisUtterance(" "); u.volume = 0; speechSynthesis.speak(u); } catch (_) {}
}
document.addEventListener("pointerdown", unlockAudio);
document.addEventListener("keydown", unlockAudio);

function onSpeakStart() { face.classList.add("speaking"); }
function onSpeakEnd() { face.classList.remove("speaking"); if ($("contMode").checked) startListen(); }

function browserSpeak(text) {  // dự phòng nếu /api/tts lỗi (cần máy có giọng vi)
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const vi = speechSynthesis.getVoices().find(v => /^vi/i.test(v.lang));
  if (vi) u.voice = vi;
  u.lang = "vi-VN"; u.rate = 1.02; u.pitch = 1.12;
  u.onstart = onSpeakStart; u.onend = onSpeakEnd;
  speechSynthesis.speak(u);
}

async function speak(text) {
  if (!text) return;
  stopSpeaking();
  try {
    const res = await fetch("/api/tts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    if (!res.ok || !(res.headers.get("content-type") || "").includes("audio")) throw new Error("tts " + res.status);
    if (currentUrl) URL.revokeObjectURL(currentUrl);
    currentUrl = URL.createObjectURL(await res.blob());
    player.src = currentUrl;
    player.onplay = onSpeakStart;
    player.onended = onSpeakEnd;
    await player.play();
  } catch (e) {
    browserSpeak(text);  // không phát được MP3 -> thử giọng trình duyệt
  }
}

function stopSpeaking() {
  try { player.pause(); } catch (_) {}
  speechSynthesis.cancel();
  face.classList.remove("speaking");
}
$("stopSpeak").onclick = stopSpeaking;

// --- Camera: bật → chụp 1 ảnh → tắt ngay (riêng tư) ---
async function captureOnce() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "user" }, width: { ideal: 1280 } }, audio: false,
  });
  const cam = $("camView"), preview = $("camPreview");
  try {
    cam.srcObject = stream; preview.style.display = "block";
    await cam.play();
    await new Promise(r => setTimeout(r, 500));  // chờ camera lấy nét/sáng
    const vw = cam.videoWidth || 1280, vh = cam.videoHeight || 720;
    const scale = Math.min(1, 768 / Math.max(vw, vh));  // thu nhỏ để nhẹ token
    const canvas = $("canvas"); canvas.width = Math.round(vw * scale); canvas.height = Math.round(vh * scale);
    canvas.getContext("2d").drawImage(cam, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
  } finally {
    stream.getTracks().forEach(t => t.stop());
    preview.style.display = "none"; cam.srcObject = null;
  }
}

// --- Gửi lên bộ não ---
function send(text) {
  text = (text || "").trim();
  if (!text) return;
  addBubble("user", text);
  history.push({ role: "user", content: text }); save();
  const thinking = addBubble("min", "…");
  setMood("thinking");
  deliver(text, null, thinking);
}

async function deliver(text, imageB64, thinking) {
  try {
    const res = await fetch("/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, image: imageB64, history: history.slice(-48), memories }),
    });
    const data = await res.json();
    $("brainDot").classList.toggle("on", res.ok);
    if (!res.ok) { thinking.textContent = "Lỗi: " + (data.error || res.status); setMood("neutral"); return; }

    // Min muốn nhìn nhưng chưa có ảnh -> chụp rồi gửi lại (1 lần).
    if (data.need_image && !imageB64) {
      thinking.textContent = "📷 Min đang nhìn…";
      let frame;
      try { frame = await captureOnce(); }
      catch (e) {
        thinking.textContent = "Mình chưa mở được camera (" + e.message + ").";
        speak("Mình chưa mở được camera, cậu kiểm tra quyền truy cập nhé.");
        return;
      }
      return deliver(text, frame, thinking);
    }

    thinking.textContent = data.reply || "(Min không trả lời)";
    if (data.tools && data.tools.length) {
      const t = document.createElement("div");
      t.className = "tools"; t.textContent = "đã dùng: " + data.tools.join(", ");
      thinking.appendChild(t);
    }
    history.push({ role: "assistant", content: data.reply || "" });
    if (Array.isArray(data.memories)) memories = data.memories;
    save();
    setMood(moodFromText(data.reply));
    speak(data.reply);
  } catch (e) {
    $("brainDot").classList.remove("on");
    thinking.textContent = "Không kết nối được bộ não: " + e.message;
    setMood("neutral");
  }
}

// --- Nghe (STT) bằng Web Speech API ---
// iOS Safari: đối tượng SpeechRecognition chỉ chạy được 1 lần -> TẠO MỚI cho mỗi lần nghe.
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null, listening = false, starting = false, startWatch = null;
function micIdle() { talk.classList.remove("rec"); face.classList.remove("listening"); talk.textContent = "🎤 Nhấn để nói"; }
function micRec() { talk.classList.add("rec"); face.classList.add("listening"); talk.textContent = "⏺ Đang nghe… (bấm để dừng)"; }
if (!SR) {
  talk.disabled = true; talk.textContent = "Trình duyệt không hỗ trợ giọng nói";
  addBubble("sys", "Trên iPhone/iPad hãy dùng Safari (cho phép quyền micro). Hoặc dùng Chrome trên máy tính/Android. Tạm thời cậu gõ chữ nhé.");
}
function buildRec() {
  const r = new SR();
  r.lang = "vi-VN"; r.interimResults = false; r.maxAlternatives = 1;
  // onstart: mic ĐÃ thật sự mở -> chốt trạng thái (tránh nút bị kẹt "đang nghe").
  r.onstart = () => { clearTimeout(startWatch); starting = false; listening = true; micRec(); };
  r.onresult = (e) => { const t = e.results[0][0].transcript; if (t) send(t); };
  r.onend = () => { clearTimeout(startWatch); starting = false; listening = false; micIdle(); };
  r.onerror = (e) => {
    clearTimeout(startWatch); starting = false; listening = false; micIdle();
    if (e.error !== "no-speech" && e.error !== "aborted") addBubble("sys", "Lỗi micro: " + e.error);
  };
  return r;
}
function startListen() {
  if (!SR || listening || starting) return;
  stopSpeaking();                                   // tắt tiếng đang phát
  try { player.removeAttribute("src"); player.load(); } catch (_) {}  // giải phóng audio session (iOS)
  starting = true; micRec();                        // phản hồi tức thì
  try {
    if (rec) { try { rec.abort(); } catch (_) {} }
    rec = buildRec();                               // mỗi phiên một đối tượng mới -> iOS nghe lại được
    rec.start();
  } catch (_) { starting = false; micIdle(); return; }
  // Watchdog: ~1.3s mà mic chưa thật sự mở (onstart chưa chạy) -> đưa nút về sẵn sàng để bấm lại.
  clearTimeout(startWatch);
  startWatch = setTimeout(() => {
    if (!listening) { try { rec && rec.abort(); } catch (_) {} starting = false; micIdle(); }
  }, 1300);
}
function stopListen() { clearTimeout(startWatch); starting = false; try { rec && rec.stop(); } catch (_) {} }
talk.onclick = () => { (listening || starting) ? stopListen() : startListen(); };

$("textForm").onsubmit = (e) => { e.preventDefault(); const v = $("textInput").value; $("textInput").value = ""; send(v); };
$("clearBtn").onclick = () => {
  if (!confirm("Xoá toàn bộ trí nhớ và lịch sử trò chuyện của Min?")) return;
  history = []; memories = []; save();
  chat.innerHTML = ""; addBubble("sys", "Đã xoá. Min bắt đầu lại từ đầu nhé.");
};
</script>
</body>
